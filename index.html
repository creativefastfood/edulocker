<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Блокиратор | Реши и играй</title>
    <!-- Библиотека для салюта -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <!-- Библиотека для чтения CSV -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
        body { background-color: #F4F7F6; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; color: #333; }
        .app-container { width: 100%; max-width: 400px; height: 100%; max-height: 850px; background: #FFFFFF; display: flex; flex-direction: column; position: relative; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .screen { display: none; flex-direction: column; height: 100%; padding: 20px; text-align: center; justify-content: center; }
        .screen.active { display: flex; }
        .logo-emoji { font-size: 80px; margin-bottom: 20px; }
        h1 { font-size: 28px; font-weight: 800; color: #1E293B; margin-bottom: 10px; line-height: 1.2; }
        p.subtitle { font-size: 16px; color: #64748B; margin-bottom: 40px; }
        
        .btn-main { background: #3B82F6; color: white; border: none; padding: 20px; font-size: 20px; font-weight: bold; border-radius: 16px; cursor: pointer; box-shadow: 0 6px 0 #2563EB; transition: transform 0.1s; }
        .btn-main:active { transform: translateY(6px); box-shadow: 0 0 0 #2563EB; }
        .btn-main:disabled { background: #94A3B8; box-shadow: 0 6px 0 #64748B; cursor: not-allowed; transform: none; }

        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .subject-badge { background: #E2E8F0; padding: 5px 12px; border-radius: 20px; font-size: 14px; font-weight: bold; color: #475569; }
        .progress-container { width: 100%; background: #E2E8F0; height: 12px; border-radius: 10px; overflow: hidden; margin-bottom: 10px; }
        .progress-bar { height: 100%; background: #10B981; width: 0%; transition: width 0.3s ease; }
        .progress-text { font-size: 14px; font-weight: bold; color: #64748B; margin-bottom: 30px; text-align: right; }
        .question-box { flex-grow: 1; display: flex; align-items: center; justify-content: center; }
        .question-text { font-size: 26px; font-weight: bold; color: #0F172A; }
        .options-container { display: flex; flex-direction: column; gap: 15px; margin-bottom: 20px; }
        .option-btn { background: #F8FAFC; border: 2px solid #E2E8F0; padding: 18px; font-size: 20px; font-weight: bold; border-radius: 16px; cursor: pointer; transition: all 0.2s; color: #334155; }
        .option-btn:active { background: #E2E8F0; }
        .option-btn.correct { background: #10B981; border-color: #10B981; color: white; transform: scale(1.05); }
        .option-btn.wrong { background: #EF4444; border-color: #EF4444; color: white; animation: shake 0.4s; }
        @keyframes shake { 0% { transform: translateX(0); } 25% { transform: translateX(-5px); } 50% { transform: translateX(5px); } 75% { transform: translateX(-5px); } 100% { transform: translateX(0); } }
        .success-code { font-size: 50px; font-weight: 900; color: #10B981; letter-spacing: 5px; margin: 20px 0; background: #ECFDF5; padding: 10px; border-radius: 15px; border: 2px dashed #10B981; }
    </style>
</head>
<body>

<div class="app-container">
    <div id="screen-start" class="screen active">
        <div class="logo-emoji">📱🔒</div>
        <h1>Хочешь поиграть?</h1>
        <p class="subtitle">Реши 3 задачи, чтобы получить доступ к телефону на 15 минут.</p>
        <button id="start-btn" class="btn-main" onclick="startGame()" disabled>Загрузка базы...</button>
    </div>

    <div id="screen-game" class="screen">
        <div class="top-bar">
            <span id="subject-label" class="subject-badge">Математика</span>
            <div style="flex-grow: 1; margin-left: 15px;">
                <div class="progress-container"><div id="progress-bar" class="progress-bar"></div></div>
            </div>
        </div>
        <div class="progress-text"><span id="current-step">0</span> / <span id="total-steps">3</span></div>
        <div class="question-box"><div id="question-text" class="question-text">Вопрос</div></div>
        <div class="options-container">
            <button class="option-btn" onclick="checkAnswer(0)" id="btn-0">Вариант 1</button>
            <button class="option-btn" onclick="checkAnswer(1)" id="btn-1">Вариант 2</button>
            <button class="option-btn" onclick="checkAnswer(2)" id="btn-2">Вариант 3</button>
        </div>
    </div>

    <div id="screen-success" class="screen">
        <div class="logo-emoji">🎉🚀</div>
        <h1>Молодец!</h1>
        <p class="subtitle">Ты отлично справился. Покажи этот код родителям, чтобы они разблокировали телефон:</p>
        <div class="success-code" id="secret-code">0000</div>
        <button class="btn-main" onclick="location.reload()" style="background: #64748B; box-shadow: 0 6px 0 #475569; margin-top: 30px;">Завершить</button>
    </div>
</div>

<script>
    let database = []; // Теперь база пустая, она загрузится из файла
    const questionsNeeded = 3; 
    let currentQuestions = [];
    let currentQuestionIndex = 0;
    let score = 0;
    let isClickable = true; 

    // МАГИЯ ЗАГРУЗКИ CSV
    window.onload = function() {
        // Добавляем случайное число к ссылке, чтобы браузер не кешировал старые версии файла
        const cacheBuster = Math.random();
        Papa.parse("questions.csv?v=" + cacheBuster, {
            download: true,
            header: true, // Говорим, что в первой строке заголовки
            skipEmptyLines: true,
            complete: function(results) {
                // Перепаковываем данные из CSV в нужный нам формат
                database = results.data.map(row => {
                    // Превращаем буквы A, B, C в индексы кнопок 0, 1, 2
                    let cIndex = 0;
                    if (row.Correct_Answer === 'B') cIndex = 1;
                    if (row.Correct_Answer === 'C') cIndex = 2;

                    return {
                        q: row.Question,
                        options: [row.Option_A, row.Option_B, row.Option_C],
                        correctIndex: cIndex,
                        subject: row.Subject
                    };
                });
                
                // Активируем кнопку Старт
                const startBtn = document.getElementById('start-btn');
                startBtn.innerText = "Начать испытание";
                startBtn.disabled = false;
                console.log("База успешно загружена. Вопросов:", database.length);
            },
            error: function(err) {
                document.getElementById('start-btn').innerText = "Ошибка загрузки базы!";
                console.error("Ошибка при загрузке CSV:", err);
            }
        });
    };

    function showScreen(screenId) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(screenId).classList.add('active');
    }

    function startGame() {
        if (database.length < questionsNeeded) {
            alert("В базе слишком мало вопросов!");
            return;
        }

        currentQuestions = [...database].sort(() => 0.5 - Math.random()).slice(0, questionsNeeded);
        currentQuestionIndex = 0;
        score = 0;
        
        document.getElementById('total-steps').innerText = questionsNeeded;
        updateProgress();
        loadQuestion();
        showScreen('screen-game');
    }

    function loadQuestion() {
        isClickable = true;
        const qData = currentQuestions[currentQuestionIndex];
        
        document.getElementById('subject-label').innerText = qData.subject;
        document.getElementById('question-text').innerText = qData.q;
        
        for(let i = 0; i < 3; i++) {
            const btn = document.getElementById(`btn-${i}`);
            btn.innerText = qData.options[i];
            btn.className = 'option-btn'; 
        }
    }

    function checkAnswer(selectedIndex) {
        if (!isClickable) return;
        isClickable = false; 

        const qData = currentQuestions[currentQuestionIndex];
        const btn = document.getElementById(`btn-${selectedIndex}`);

        if (selectedIndex === qData.correctIndex) {
            btn.classList.add('correct');
            score++;
            updateProgress();
            
            setTimeout(() => {
                currentQuestionIndex++;
                if (currentQuestionIndex < questionsNeeded) {
                    loadQuestion();
                } else {
                    finishGame();
                }
            }, 800); 
        } else {
            btn.classList.add('wrong');
            setTimeout(() => {
                btn.classList.remove('wrong');
                isClickable = true;
            }, 600);
        }
    }

    function updateProgress() {
        document.getElementById('current-step').innerText = score;
        const percent = (score / questionsNeeded) * 100;
        document.getElementById('progress-bar').style.width = `${percent}%`;
    }

    function finishGame() {
        showScreen('screen-success');
        const code = Math.floor(1000 + Math.random() * 9000);
        document.getElementById('secret-code').innerText = code;
        
        var duration = 3 * 1000;
        var end = Date.now() + duration;
        (function frame() {
            confetti({ particleCount: 5, angle: 60, spread: 55, origin: { x: 0 }, colors: ['#10B981', '#3B82F6', '#F59E0B'] });
            confetti({ particleCount: 5, angle: 120, spread: 55, origin: { x: 1 }, colors: ['#10B981', '#3B82F6', '#F59E0B'] });
            if (Date.now() < end) requestAnimationFrame(frame);
        }());
    }
</script>
</body>
</html>
